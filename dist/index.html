<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperial Chess World - Admission Portal</title>
    <!-- Tailwind CSS v3 via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .step-content { display: none; }
        .step-content.active { display: block; }

        .day-btn.selected {
            background-color: #ed1c24;
            border-color: #ed1c24;
            color: white;
            box-shadow: 0 10px 15px -3px rgba(237, 28, 36, 0.3);
            transform: scale(1.05);
        }

        .glass-card {
            background: white;
            border: 1px solid #e2e8f0;
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.1);
        }

        .admin-view { display: none; }
        .admin-view.active { display: block; }
    </style>
</head>
<body class="antialiased overflow-x-hidden">

    <!-- Decorative BG -->
    <div class="fixed top-0 left-0 w-full h-64 bg-gradient-to-b from-slate-200/50 to-transparent -z-10"></div>

    <div class="max-w-4xl mx-auto px-4 py-8 md:py-12">
        
        <!-- Header -->
        <header class="text-center mb-10 cursor-pointer select-none" id="secret-trigger">
            <div class="inline-block p-2 rounded-3xl mb-4 bg-white shadow-sm border border-slate-100">
                <img src="ICW logo-1.png" alt="ICW Logo" class="h-20 md:h-28 w-auto object-contain" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2913/2913501.png'">
            </div>
            <h1 class="text-3xl md:text-5xl font-[900] tracking-tight leading-tight flex flex-col md:flex-row items-center justify-center md:gap-3">
                <span class="text-slate-800">IMPERIAL</span>
                <span class="text-[#ed1c24] relative">
                    CHESS
                    <span class="absolute -bottom-1 left-0 w-full h-1 bg-[#ed1c24]/10 rounded-full"></span>
                </span>
                <span class="text-slate-800">WORLD</span>
            </h1>
            <div id="portal-label" class="mt-4 inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-slate-800 text-white text-[10px] md:text-xs font-black uppercase tracking-[0.3em] shadow-lg">
                <i data-lucide="calendar" class="w-3 h-3 text-[#ed1c24]"></i>
                Student Admission Portal
            </div>
        </header>

        <!-- Main Form Container -->
        <main id="form-container" class="max-w-xl mx-auto glass-card rounded-[2.5rem] md:rounded-[3.5rem] overflow-hidden transition-all duration-500">
            <!-- Stepper -->
            <nav class="flex border-b border-slate-100 bg-slate-50/30">
                <div id="step-tab-1" class="flex-1 py-5 text-center text-[10px] font-black uppercase tracking-widest border-b-4 border-[#ed1c24] text-[#ed1c24]">Details</div>
                <div id="step-tab-2" class="flex-1 py-5 text-center text-[10px] font-black uppercase tracking-widest text-slate-300">Payment</div>
                <div id="step-tab-3" class="flex-1 py-5 text-center text-[10px] font-black uppercase tracking-widest text-slate-300">Success</div>
            </nav>

            <div class="p-6 md:p-12">
                <!-- Error Message -->
                <div id="error-box" class="hidden mb-8 p-4 bg-red-50 border border-red-100 rounded-2xl flex items-center gap-3 text-red-600 text-sm">
                    <i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0"></i>
                    <span id="error-text" class="font-bold"></span>
                </div>

                <!-- Step 1: Details -->
                <div id="step-1" class="step-content active space-y-8">
                    <div class="space-y-3">
                        <label class="text-[11px] font-black text-gray-400 uppercase tracking-widest ml-1 flex items-center gap-2">
                            <i data-lucide="user" class="w-3 h-3 text-[#ed1c24]"></i> Student Information
                        </label>
                        <input type="text" id="studentName" class="w-full bg-slate-50 border-2 border-slate-50 rounded-2xl px-6 py-4 focus:border-[#ed1c24] focus:bg-white focus:ring-4 focus:ring-red-50 outline-none transition-all font-bold text-slate-800" placeholder="Enter student's full name">
                    </div>

                    <div class="space-y-3">
                        <label class="text-[11px] font-black text-gray-400 uppercase tracking-widest ml-1 flex items-center gap-2">
                            <i data-lucide="message-square" class="w-3 h-3 text-[#ed1c24]"></i> Demo Session Feedback
                        </label>
                        <textarea id="demoFeedback" rows="3" class="w-full bg-slate-50 border-2 border-slate-50 rounded-2xl px-6 py-4 focus:border-[#ed1c24] focus:bg-white focus:ring-4 focus:ring-red-50 outline-none resize-none transition-all font-bold text-slate-800" placeholder="Share your demo experience..."></textarea>
                    </div>

                    <div class="space-y-4">
                        <label class="text-[11px] font-black text-gray-400 uppercase tracking-widest ml-1 flex justify-between items-center">
                            <span class="flex items-center gap-2"><i data-lucide="calendar" class="w-3 h-3 text-[#ed1c24]"></i> Select Schedule</span>
                            <span id="day-counter" class="text-[#ed1c24] bg-red-50 px-2 py-0.5 rounded-lg">0/2 Days</span>
                        </label>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                            <button onclick="handleDayToggle('Monday', this)" class="day-btn py-4 rounded-2xl text-[10px] font-black border-2 bg-white border-slate-100 text-slate-400 transition-all uppercase">Mon</button>
                            <button onclick="handleDayToggle('Tuesday', this)" class="day-btn py-4 rounded-2xl text-[10px] font-black border-2 bg-white border-slate-100 text-slate-400 transition-all uppercase">Tue</button>
                            <button onclick="handleDayToggle('Wednesday', this)" class="day-btn py-4 rounded-2xl text-[10px] font-black border-2 bg-white border-slate-100 text-slate-400 transition-all uppercase">Wed</button>
                            <button onclick="handleDayToggle('Thursday', this)" class="day-btn py-4 rounded-2xl text-[10px] font-black border-2 bg-white border-slate-100 text-slate-400 transition-all uppercase">Thu</button>
                            <button onclick="handleDayToggle('Friday', this)" class="day-btn py-4 rounded-2xl text-[10px] font-black border-2 bg-white border-slate-100 text-slate-400 transition-all uppercase">Fri</button>
                            <button onclick="handleDayToggle('Saturday', this)" class="day-btn py-4 rounded-2xl text-[10px] font-black border-2 bg-white border-slate-100 text-slate-400 transition-all uppercase">Sat</button>
                            <button onclick="handleDayToggle('Sunday', this)" class="day-btn py-4 rounded-2xl text-[10px] font-black border-2 bg-white border-slate-100 text-slate-400 transition-all uppercase">Sun</button>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <label class="text-[11px] font-black text-gray-400 uppercase tracking-widest ml-1 flex items-center gap-2">
                            <i data-lucide="clock" class="w-3 h-3 text-[#ed1c24]"></i> Regular Time Slot
                        </label>
                        <select id="preferredTime" class="w-full bg-slate-50 border-2 border-slate-50 rounded-2xl px-6 py-4 outline-none appearance-none focus:border-[#ed1c24] focus:bg-white transition-all font-bold text-slate-800 cursor-pointer">
                            <option value="">Select a time...</option>
                            <option>4:00 PM - 5:00 PM</option>
                            <option>5:00 PM - 6:00 PM</option>
                            <option>6:00 PM - 7:00 PM</option>
                            <option>7:00 PM - 8:00 PM</option>
                        </select>
                    </div>

                    <button onclick="goToStep(2)" class="w-full bg-[#ed1c24] text-white font-black py-5 md:py-6 rounded-2xl md:rounded-3xl shadow-xl shadow-red-200 active:scale-95 transition-all flex items-center justify-center gap-3 uppercase tracking-widest text-xs">
                        Review Admission <i data-lucide="chevron-right" class="w-5 h-5"></i>
                    </button>
                </div>

                <!-- Step 2: Payment -->
                <div id="step-2" class="step-content text-center space-y-10 py-4">
                    <div class="w-24 md:w-32 h-24 md:h-32 bg-slate-50 rounded-full flex items-center justify-center mx-auto border-4 border-[#ed1c24]">
                        <i data-lucide="credit-card" class="w-10 h-10 md:w-14 md:h-14 text-[#ed1c24]"></i>
                    </div>
                    <div class="space-y-2">
                        <h2 class="text-2xl md:text-3xl font-black uppercase tracking-tight text-slate-800">Final Review</h2>
                        <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest">Enrollment confirmation required</p>
                    </div>
                    <div class="bg-slate-50 rounded-[2.5rem] p-8 text-left border border-slate-100 space-y-4 mx-auto max-w-sm">
                        <div id="review-student" class="text-xl font-[900] text-slate-800 tracking-tight"></div>
                        <div class="flex justify-between items-center pt-6 border-t border-slate-200">
                            <span class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Total Fee</span> 
                            <span class="text-4xl font-black text-[#ed1c24] tracking-tighter">₹100</span>
                        </div>
                    </div>
                    <div class="space-y-5">
                        <button id="pay-btn" onclick="startRazorpay()" class="w-full bg-[#ed1c24] text-white font-black py-6 rounded-3xl flex justify-center items-center gap-4 shadow-2xl hover:bg-[#d01921] transition-all uppercase tracking-widest text-xs">
                            Complete Payment
                        </button>
                        <button onclick="goToStep(1)" class="text-slate-400 text-[10px] font-black uppercase tracking-widest">Return to Edit</button>
                    </div>
                </div>

                <!-- Step 3: Success -->
                <div id="step-3" class="step-content text-center space-y-10 py-10">
                    <div class="w-28 md:w-40 h-28 md:h-40 bg-green-50 rounded-full flex items-center justify-center mx-auto border-8 border-white shadow-2xl animate-bounce">
                        <i data-lucide="check-circle-2" class="w-14 h-14 md:w-20 md:h-20 text-green-500"></i>
                    </div>
                    <h2 class="text-4xl md:text-6xl font-black uppercase italic tracking-tighter text-slate-800">CHECK<span class="text-[#ed1c24]">MATE</span>!</h2>
                    <div class="space-y-4 pt-6 max-w-sm mx-auto">
                        <button onclick="downloadReceipt()" class="w-full bg-slate-900 text-white font-black py-6 rounded-3xl flex justify-center items-center gap-4 shadow-xl uppercase tracking-widest text-[10px]">
                            <i data-lucide="download" class="w-5 h-5 text-[#ed1c24]"></i> Download Receipt
                        </button>
                        <button onclick="location.reload()" class="text-slate-400 text-[10px] font-black uppercase tracking-widest pt-4">Process New Admission</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Admin View (Hidden) -->
        <main id="admin-view" class="admin-view bg-white border border-slate-200 rounded-[2rem] md:rounded-[3rem] shadow-2xl overflow-hidden">
            <div class="p-6 md:p-8 border-b border-slate-100 flex flex-col md:flex-row justify-between items-center bg-slate-50/50 gap-4">
                <div class="flex items-center gap-4">
                    <button onclick="hideAdmin()" class="p-2 hover:bg-white rounded-full transition-all border border-transparent hover:border-slate-200 text-slate-400 hover:text-slate-800">
                        <i data-lucide="chevron-left" class="w-6 h-6"></i>
                    </button>
                    <h2 class="font-black uppercase tracking-widest text-sm text-slate-800">Enrollment Data</h2>
                </div>
                <button onclick="exportAll()" class="p-3.5 bg-slate-900 text-white rounded-2xl hover:bg-black transition-all shadow-lg flex items-center gap-2 text-xs font-black uppercase tracking-widest">
                    <i data-lucide="download" class="w-5 h-5"></i> Export CSV
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left min-w-[600px]">
                    <thead class="bg-slate-50 text-[10px] font-black uppercase text-slate-400 border-b border-slate-100">
                        <tr>
                            <th class="px-8 py-5">Student</th>
                            <th class="px-8 py-5">Schedule</th>
                            <th class="px-8 py-5">Payment</th>
                            <th class="px-8 py-5">Date</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body" class="divide-y divide-slate-50">
                        <!-- Data injected here -->
                    </tbody>
                </table>
            </div>
        </main>

        <footer class="mt-12 text-center opacity-30 select-none">
            <div class="h-px w-full bg-slate-200 mb-6"></div>
            <p class="text-[9px] font-black uppercase tracking-[0.5em] text-slate-500">Imperial Chess World Excellence</p>
        </footer>
    </div>

    <!-- Razorpay SDK -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
        // --- CONFIG & STATE ---
        const RAZORPAY_KEY = "rzp_live_Q1kOja5eGeifXq";
        let selectedDays = [];
        let secretClicks = 0;
        let admissions = JSON.parse(localStorage.getItem('icw_admissions') || '[]');

        // --- CORE FUNCTIONS ---
        function handleDayToggle(day, btn) {
            const index = selectedDays.indexOf(day);
            if (index === -1) {
                if (selectedDays.length >= 2) return;
                selectedDays.push(day);
                btn.classList.add('selected');
            } else {
                selectedDays.splice(index, 1);
                btn.classList.remove('selected');
            }
            document.getElementById('day-counter').innerText = `${selectedDays.length}/2 Days`;
        }

        function showError(msg) {
            const box = document.getElementById('error-box');
            document.getElementById('error-text').innerText = msg;
            box.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function goToStep(step) {
            if (step === 2) {
                const name = document.getElementById('studentName').value;
                const feedback = document.getElementById('demoFeedback').value;
                const time = document.getElementById('preferredTime').value;

                if (!name.trim() || !feedback.trim()) return showError("Name and feedback are required.");
                if (selectedDays.length !== 2) return showError("Please select exactly 2 days.");
                if (!time) return showError("Please choose a time slot.");

                document.getElementById('review-student').innerText = name;
            }

            document.getElementById('error-box').classList.add('hidden');
            
            // UI Tab Switch
            for (let i = 1; i <= 3; i++) {
                document.getElementById(`step-content-${i}`)?.classList.remove('active');
                const content = document.getElementById(`step-${i}`);
                const tab = document.getElementById(`step-tab-${i}`);
                
                content.classList.toggle('active', i === step);
                if (i === step) {
                    tab.classList.add('border-b-4', 'border-[#ed1c24]', 'text-[#ed1c24]');
                    tab.classList.remove('text-slate-300');
                } else if (i < step) {
                    tab.classList.remove('border-b-4', 'border-[#ed1c24]');
                    tab.classList.add('text-green-500');
                } else {
                    tab.classList.remove('border-b-4', 'border-[#ed1c24]', 'text-[#ed1c24]');
                    tab.classList.add('text-slate-300');
                }
            }
        }

        function startRazorpay() {
            const name = document.getElementById('studentName').value;
            const feedback = document.getElementById('demoFeedback').value;
            const time = document.getElementById('preferredTime').value;

            const options = {
                key: RAZORPAY_KEY,
                amount: 10000,
                currency: "INR",
                name: "Imperial Chess World",
                description: "Admission Fee",
                image: "ICW logo-1.png",
                handler: function (response) {
                    const entry = {
                        id: Date.now(),
                        name: name,
                        feedback: feedback,
                        days: selectedDays.join(' & '),
                        time: time,
                        paymentId: response.razorpay_payment_id,
                        date: new Date().toLocaleDateString()
                    };
                    admissions.unshift(entry);
                    localStorage.setItem('icw_admissions', JSON.stringify(admissions));
                    goToStep(3);
                },
                prefill: { name: name, contact: "9999999999", email: "support@imperialchessworld.com" },
                theme: { color: "#ed1c24" }
            };
            const rzp = new Razorpay(options);
            rzp.open();
        }

        // --- EXPORTS ---
        function downloadCSV(data, filename) {
            const headers = ["Name", "Feedback", "Schedule", "Time", "Payment ID", "Date"];
            const rows = data.map(a => [`"${a.name}"`, `"${a.feedback.replace(/"/g, '""')}"`, `"${a.days}"`, `"${a.time}"`, `"${a.paymentId}"`, `"${a.date}"`]);
            const content = [headers, ...rows].map(e => e.join(",")).join("\n");
            const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
        }

        function downloadReceipt() {
            downloadCSV([admissions[0]], `ICW_Receipt_${admissions[0].name}.csv`);
        }

        function exportAll() {
            downloadCSV(admissions, 'ICW_All_Records.csv');
        }

        // --- SECRET ADMIN ---
        document.getElementById('secret-trigger').addEventListener('click', () => {
            secretClicks++;
            if (secretClicks >= 5) {
                showAdmin();
                secretClicks = 0;
            }
            setTimeout(() => secretClicks = 0, 3000);
        });

        function showAdmin() {
            document.getElementById('form-container').style.display = 'none';
            document.getElementById('admin-view').classList.add('active');
            document.getElementById('portal-label').innerHTML = `<i data-lucide="shield-check" class="w-3 h-3 text-[#ed1c24]"></i> Management Dashboard`;
            
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = admissions.map(a => `
                <tr class="hover:bg-slate-50/50">
                    <td class="px-8 py-6">
                        <div class="font-extrabold text-slate-800">${a.name}</div>
                        <div class="text-[10px] text-slate-400 italic mt-1 line-clamp-1">${a.feedback}</div>
                    </td>
                    <td class="px-8 py-6 text-xs font-bold text-slate-700">${a.days}<br><span class="text-[10px] text-slate-400 font-normal">${a.time}</span></td>
                    <td class="px-8 py-6"><span class="px-3 py-1 bg-green-50 text-green-600 text-[9px] font-black uppercase rounded-full">Paid</span></td>
                    <td class="px-8 py-6 text-[11px] font-bold text-slate-400 uppercase">${a.date}</td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function hideAdmin() {
            document.getElementById('form-container').style.display = 'block';
            document.getElementById('admin-view').classList.remove('active');
            document.getElementById('portal-label').innerHTML = `<i data-lucide="calendar" class="w-3 h-3 text-[#ed1c24]"></i> Student Admission Portal`;
        }

        // Initialize Icons
        lucide.createIcons();
    </script>
</body>
</html>
